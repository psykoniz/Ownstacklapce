id: io.ownstack.ownstackide
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: ownstack-ide
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
modules:
  - name: ownstack-ide
    buildsystem: simple
    build-commands:
      - install -Dm755 ownstack-ide /app/bin/ownstack-ide
      - install -Dm644 io.ownstack.ownstackide.desktop /app/share/applications/io.ownstack.ownstackide.desktop
      - install -Dm644 io.ownstack.ownstackide.metainfo.xml /app/share/metainfo/io.ownstack.ownstackide.metainfo.xml
      - install -Dm644 io.ownstack.ownstackide.png /app/share/icons/hicolor/512x512/apps/io.ownstack.ownstackide.png
    sources:
      - type: file
        path: target/release-lto/ownstack-ide
      - type: file
        path: extra/linux/io.ownstack.ownstackide.desktop
      - type: file
        path: extra/linux/io.ownstack.ownstackide.metainfo.xml
      - type: file
        path: extra/images/logo.png
        dest-filename: io.ownstack.ownstackide.png
