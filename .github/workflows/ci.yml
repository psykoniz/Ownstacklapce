# OwnStack IDE CI Workflow
# Based on Lapce CI with OwnStack additions

on:
  push:
    branches:
      - master
      - ownstack/main
      - claude/**
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - Cargo.toml
      - Cargo.lock
      - lapce-**
      - ownstack-**
      - .github/workflows/ci.yml
  workflow_dispatch:

name: CI

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  required-gates:
    name: Required Gates
    if: github.event.pull_request.draft == false
    needs: [check-workspace, test-ownstack, healthcheck]
    runs-on: ubuntu-latest
    steps:
      - name: Confirm mandatory gates
        run: echo Mandatory gates passed

  build:
    name: Rust on ${{ matrix.os }}
    if: github.event.pull_request.draft == false
    needs: [required-gates]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies on Ubuntu
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo make ubuntu-deps

      - name: Update toolchain & add llvm-tools
        run: |
          rustup update --no-self-update

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Fetch dependencies
        run: cargo fetch --locked

      - name: Build core binaries
        run: |
          cargo build --locked -p lapce-app --bin ownstack-ide
          cargo build --locked -p ownstack-agent --bin ownstack-agent
          cargo build --locked -p lapce-proxy --bin lapce-proxy

      - name: Build as portable
        if: startsWith(matrix.os, 'windows')
        run: cargo build --locked -p lapce-app --bin ownstack-ide --features lapce-app/portable

      - name: Run doc tests
        run: cargo test --doc --workspace

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OwnStack-${{ matrix.os }}
          path: |
            target/debug/ownstack-ide*
            target/debug/lapce*
            target/debug/ownstack-agent*
            target/debug/lapce-proxy*
          if-no-files-found: error
          retention-days: 7

      - name: Free space on Windows
        if: startsWith(matrix.os, 'windows')
        run: cargo clean

  fmt:
    name: Rustfmt
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update toolchain & add rustfmt
        run: |
          rustup update
          rustup component add rustfmt

      - name: Run rustfmt
        run: cargo fmt --all --check

  clippy:
    name: Clippy on ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Update toolchain & add clippy
        run: |
          rustup update --no-self-update
          rustup component add clippy

      - name: Install dependencies on Ubuntu
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo make ubuntu-deps

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Fetch dependencies
        run: cargo fetch --locked

      - name: Run clippy
        run: cargo clippy

  check-workspace:
    name: Workspace Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update toolchain
        run: rustup update --no-self-update
      - name: Install dependencies
        run: sudo make ubuntu-deps
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - name: Fetch dependencies
        run: cargo fetch --locked
      - name: Cargo Check
        run: cargo check --workspace --all-targets --locked

  test-ownstack:
    name: Core Crates Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update toolchain
        run: rustup update --no-self-update
      - name: Install dependencies
        run: sudo make ubuntu-deps
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - name: Fetch dependencies
        run: cargo fetch --locked
      - name: Test ownstack-engine
        run: cargo test -p ownstack-engine --locked
      - name: Test ownstack-bridge
        run: cargo test -p ownstack-bridge --locked
      - name: Test lapce-rpc
        run: cargo test -p lapce-rpc --locked
      - name: Test ownstack-agent
        run: cargo test -p ownstack-agent --lib --tests --locked

  healthcheck:
    name: System Healthcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: sudo make ubuntu-deps
      - name: Update toolchain
        run: rustup update --no-self-update
      - name: Fetch dependencies
        run: cargo fetch --locked
      - name: Build Agent for Healthcheck
        run: cargo build -p ownstack-agent -p lapce-proxy --locked
      - name: Run healthcheck.py
        run: python scripts/healthcheck.py
